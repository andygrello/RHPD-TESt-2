<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHPD Officer Verwaltung</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f2f2f2; }
    h1, h2 { color: #003366; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background-color: #fff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #003366; color: white; }
    button { padding: 5px 10px; margin: 2px; cursor: pointer; }
    input, select { padding: 5px; margin: 5px; }
    #calendar { background-color: #fff; padding: 10px; border: 1px solid #ccc; }
    .event { margin: 5px 0; padding: 5px; background-color: #cce5ff; border-radius: 4px; }
    .checkboxes label { margin-right: 10px; display: inline-block; }
  </style>
</head>
<body>

  <h1>RHPD Officer Verwaltung</h1>

  <h2>Personalliste</h2>
  <table id="officerTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Dienstgrad</th>
        <th>Eintrittsdatum</th>
        <th>Letzte Beförderung</th>
        <th>Ausbildungen</th>
        <th>Aktionen</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <h3>Neuen Officer hinzufügen</h3>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="rank" placeholder="Dienstgrad">
  <input type="date" id="entryDate" placeholder="Eintrittsdatum">
  <input type="date" id="promotionDate" placeholder="Letzte Beförderung">
  <div class="checkboxes">
    <label><input type="checkbox" value="GAB 01"> GAB 01</label>
    <label><input type="checkbox" value="GAB 02"> GAB 02</label>
    <label><input type="checkbox" value="Aktenschulung"> Aktenschulung</label>
    <label><input type="checkbox" value="Beweissicherung"> Beweissicherung</label>
    <label><input type="checkbox" value="Leitstellenausbildung"> Leitstellenausbildung</label>
    <label><input type="checkbox" value="Einsatzleitung"> Einsatzleitung</label>
    <label><input type="checkbox" value="Verhandlungsführung"> Verhandlungsführung</label>
    <label><input type="checkbox" value="Overwatch"> Overwatch</label>
  </div>
  <button onclick="addOfficer()">Hinzufügen</button>

  <h2>Ausbildungskalender</h2>
  <div id="calendar">
    <h3>Termine</h3>
    <div id="eventsList"></div>
    <input type="text" id="eventName" placeholder="Ausbildungs-Titel">
    <input type="date" id="eventDate">
    <button onclick="addEvent()">Termin hinzufügen</button>
  </div>

  <script>
    let officers = JSON.parse(localStorage.getItem("officers")) || [];
    let events = JSON.parse(localStorage.getItem("events")) || [];

    function saveData() {
      localStorage.setItem("officers", JSON.stringify(officers));
      localStorage.setItem("events", JSON.stringify(events));
    }

    function renderTable() {
      const tbody = document.querySelector("#officerTable tbody");
      tbody.innerHTML = "";
      officers.forEach((officer, index) => {
        const coursesText = officer.courses && officer.courses.length ? officer.courses.join(", ") : "Keine Ausbildung";
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><input type="text" value="${officer.name}" onchange="updateOfficer(${index}, 'name', this.value)"></td>
          <td><input type="text" value="${officer.rank}" onchange="updateOfficer(${index}, 'rank', this.value)"></td>
          <td><input type="date" value="${officer.entryDate}" onchange="updateOfficer(${index}, 'entryDate', this.value)"></td>
          <td><input type="date" value="${officer.promotionDate}" onchange="updateOfficer(${index}, 'promotionDate', this.value)"></td>
          <td>${coursesText}</td>
          <td><button onclick="deleteOfficer(${index})">Löschen</button></td>
        `;
        tbody.appendChild(row);
      });
      saveData();
    }

    function addOfficer() {
      const name = document.getElementById("name").value;
      const rank = document.getElementById("rank").value;
      const entryDate = document.getElementById("entryDate").value;
      const promotionDate = document.getElementById("promotionDate").value;
      const checkboxes = document.querySelectorAll(".checkboxes input[type='checkbox']");
      const courses = [];
      checkboxes.forEach(cb => { if(cb.checked) courses.push(cb.value); });
      if(name && rank && entryDate) {
        officers.push({name, rank, entryDate, promotionDate, courses});
        renderTable();
        document.getElementById("name").value = "";
        document.getElementById("rank").value = "";
        document.getElementById("entryDate").value = "";
        document.getElementById("promotionDate").value = "";
        checkboxes.forEach(cb => cb.checked = false);
      } else {
        alert("Bitte alle Pflichtfelder ausfüllen (Name, Dienstgrad, Eintrittsdatum).");
      }
    }

    function updateOfficer(index, field, value) {
      officers[index][field] = value;
      renderTable();
    }

    function deleteOfficer(index) {
      if(confirm("Diesen Officer wirklich löschen?")) {
        officers.splice(index, 1);
        renderTable();
      }
    }

    function renderEvents() {
      const eventsList = document.getElementById("eventsList");
      eventsList.innerHTML = "";
      events.forEach((event, index) => {
        const div = document.createElement("div");
        div.className = "event";
        div.innerHTML = `${event.date} - ${event.name} <button onclick="deleteEvent(${index})">Löschen</button>`;
        eventsList.appendChild(div);
      });
      saveData();
    }

    function addEvent() {
      const name = document.getElementById("eventName").value;
      const date = document.getElementById("eventDate").value;
      if(name && date) {
        events.push({name, date});
        renderEvents();
        document.getElementById("eventName").value = "";
        document.getElementById("eventDate").value = "";
      } else {
        alert("Bitte Ausbildungs-Titel und Datum angeben.");
      }
    }

    function deleteEvent(index) {
      if(confirm("Diesen Termin wirklich löschen?")) {
        events.splice(index, 1);
        renderEvents();
      }
    }

    renderTable();
    renderEvents();
  </script>

</body>
</html>
